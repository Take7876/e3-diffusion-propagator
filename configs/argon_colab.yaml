seed: 42
output_dir: outputs/argon_diffusion

data:
  topology_path: data/argon/nve.tpr
  trajectory_path: data/argon/nve.trr
  stride: 1
  time_lag: 1
  train_split: 0.9
  max_frames: null
  max_atoms: null
  cutoff: 8.0
  neighbor_k: 24
  box_wrap: false

model:
  hidden_dim: 128
  num_layers: 5
  time_embedding_dim: 64
  diffusion_steps: 100
  beta_start: 1.0e-4
  beta_end: 2.0e-2

training:
  batch_size: 4
  num_epochs: 40
  learning_rate: 3.0e-4
  weight_decay: 1.0e-6
  grad_clip_norm: 1.0
  mixed_precision: true
  num_workers: 2
  log_every: 10
  validate_every: 1
